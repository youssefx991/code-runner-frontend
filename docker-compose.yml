services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: compiler-frontend

    ports:
      - "4200:80"

    environment:
      NODE_ENV: production

    depends_on:
      - backend

    networks:
      - compiler-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  backend:
    image: alpine
    command: sleep infinity
    networks:
      - compiler-network

networks:
  compiler-network:
    name: compiler-network
    driver: bridge
